<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>找猫大师</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }
        
        .game-container {
            width: 100%;
            max-width: 500px;
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        /* 顶部标题栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .title-section {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }
        
        .game-title {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }
        
        .version {
            font-size: 12px;
            opacity: 0.8;
        }
        
        .score-badge {
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            padding: 6px 16px;
            text-align: center;
            min-width: 80px;
        }
        
        .score-number {
            font-size: 24px;
            font-weight: bold;
        }
        
        .score-label {
            font-size: 10px;
            opacity: 0.9;
        }
        
        /* 关卡信息栏 */
        .level-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            background: #f8f8f8;
            border-bottom: 1px solid #eee;
        }
        
        .level-number {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }
        
        .streak-info {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }
        
        .hearts {
            display: flex;
            gap: 2px;
        }
        
        .heart {
            font-size: 16px;
        }
        
        .heart.lost {
            opacity: 0.3;
        }
        
        /* 棋盘区域 */
        .board-section {
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        
        .board-wrapper {
            display: flex;
            gap: 8px;
        }
        
        .row-numbers {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 2px 0;
        }
        
        .row-num, .col-num {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
            font-weight: 500;
        }
        
        .board-container {
            position: relative;
        }
        
        .col-numbers {
            display: flex;
            justify-content: space-around;
            margin-top: 4px;
        }
        
        .board {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 3px;
            background: #ddd;
            padding: 3px;
            border-radius: 8px;
        }
        
        .cell {
            aspect-ratio: 1 / 1;
            background: #f0f0f0;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            position: relative;
        }
        
        .cell:hover {
            filter: brightness(0.95);
        }
        
        .cell:active {
            transform: scale(0.95);
        }
        
        /* 颜色区域背景 */
        .cell[data-region="A"] { background: #ffcccc; }
        .cell[data-region="B"] { background: #ccffcc; }
        .cell[data-region="C"] { background: #ccccff; }
        .cell[data-region="D"] { background: #ffffcc; }
        .cell[data-region="E"] { background: #ffccff; }
        .cell[data-region="F"] { background: #ccffff; }
        .cell[data-region="G"] { background: #ffd9cc; }
        .cell[data-region="H"] { background: #d9ffcc; }
        .cell[data-region="I"] { background: #d9ccff; }
        .cell[data-region="J"] { background: #ffddcc; }
        
        /* 色盲模式纹理 */
        .colorblind .cell[data-region="A"] { 
            background: repeating-linear-gradient(45deg, #f0f0f0, #f0f0f0 4px, #e8e8e8 4px, #e8e8e8 8px);
        }
        .colorblind .cell[data-region="B"] { 
            background: repeating-linear-gradient(-45deg, #f0f0f0, #f0f0f0 4px, #e0e0e0 4px, #e0e0e0 8px);
        }
        .colorblind .cell[data-region="C"] { 
            background: radial-gradient(circle, #f0f0f0 3px, #e0e0e0 3px);
            background-size: 8px 8px;
        }
        .colorblind .cell[data-region="D"] { 
            background: repeating-linear-gradient(90deg, #f0f0f0, #f0f0f0 4px, #d8d8d8 4px, #d8d8d8 8px);
        }
        .colorblind .cell[data-region="E"] { 
            background: repeating-linear-gradient(0deg, #f0f0f0, #f0f0f0 4px, #d0d0d0 4px, #d0d0d0 8px);
        }
        .colorblind .cell[data-region="F"] { 
            background: repeating-linear-gradient(45deg, #f0f0f0, #f0f0f0 2px, #d8d8d8 2px, #d8d8d8 4px);
        }
        .colorblind .cell[data-region="G"] { 
            background: repeating-linear-gradient(-45deg, #f0f0f0, #f0f0f0 2px, #d0d0d0 2px, #d0d0d0 4px);
        }
        .colorblind .cell[data-region="H"] { 
            background: radial-gradient(circle, #e0e0e0 2px, #f0f0f0 2px);
            background-size: 6px 6px;
        }
        .colorblind .cell[data-region="I"] { 
            background: repeating-linear-gradient(90deg, #f0f0f0, #f0f0f0 3px, #d5d5d5 3px, #d5d5d5 6px);
        }
        .colorblind .cell[data-region="J"] { 
            background: repeating-linear-gradient(0deg, #f0f0f0, #f0f0f0 3px, #d5d5d5 3px, #d5d5d5 6px);
        }
        
        .cell .cat {
            font-size: 32px;
            animation: popIn 0.2s ease-out;
            position: relative;
            z-index: 10;
            filter: contrast(1.2) brightness(1.1);
        }
        
        .cell .marker {
            width: 10px;
            height: 10px;
            background: rgba(255, 68, 68, 0.8);
            border-radius: 50%;
            border: 2px solid #ff4444;
        }
        
        .cell .x-mark {
            color: #ff6b6b;
            font-size: 28px;
            font-weight: bold;
        }
        
        .cell .coords {
            position: absolute;
            bottom: 2px;
            right: 3px;
            font-size: 8px;
            color: #999;
            opacity: 0.7;
        }
        
        .cell.hint {
            animation: hintPulse 0.5s ease-in-out infinite;
        }
        
        .cell.error {
            animation: shake 0.3s ease-in-out;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        @keyframes hintPulse {
            0%, 100% { box-shadow: 0 0 0 2px #ff6b6b; }
            50% { box-shadow: 0 0 0 4px #ff6b6b; }
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        
        /* 底部信息 */
        .bottom-info {
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #eee;
            background: #fafafa;
        }
        
        .cat-icon {
            font-size: 20px;
        }
        
        .remaining-text {
            font-size: 14px;
            color: #666;
        }
        
        .remaining-count {
            font-weight: bold;
            color: #333;
        }
        
        /* 按钮区域 */
        .buttons {
            display: flex;
            gap: 8px;
            padding: 16px 20px;
            background: #fff;
            border-top: 1px solid #eee;
            flex-wrap: wrap;
        }
        
        .btn {
            flex: 1;
            min-width: 80px;
            padding: 10px 8px;
            background: #f0f0f0;
            border: none;
            border-radius: 8px;
            font-size: 12px;
            color: #333;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        
        .btn:hover {
            background: #e0e0e0;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn.active {
            background: #667eea;
            color: white;
        }
        
        /* Toast提示 */
        .toast {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 16px 32px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 1000;
            transition: transform 0.3s ease-out;
        }
        
        .toast.show {
            transform: translate(-50%, -50%) scale(1);
        }
        
        /* 胜利弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            background: white;
            padding: 32px 40px;
            border-radius: 20px;
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.3s;
        }
        
        .modal.show .modal-content {
            transform: scale(1);
        }
        
        .modal-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 8px;
        }
        
        .modal-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 24px;
        }
        
        .modal-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .modal-btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 顶部标题栏 -->
        <div class="header">
            <div class="title-section">
                <span class="game-title">84R5r6RZ</span>
                <span class="version">1.0.8</span>
            </div>
            <div class="score-badge">
                <div class="score-number">120</div>
                <div class="score-label">已满</div>
            </div>
        </div>
        
        <!-- 关卡信息栏 -->
        <div class="level-info">
            <span class="level-number" id="levelNumber">第4关</span>
            <div class="streak-info">
                <div class="hearts">
                    <span class="heart" id="heart1">❤️</span>
                    <span class="heart" id="heart2">❤️</span>
                </div>
                <span>连胜: <span id="streak">1</span></span>
            </div>
        </div>
        
        <!-- 棋盘区域 -->
        <div class="board-section">
            <div class="board-wrapper">
                <div class="row-numbers">
                    <div class="row-num">5</div>
                    <div class="row-num">4</div>
                    <div class="row-num">3</div>
                    <div class="row-num">2</div>
                    <div class="row-num">1</div>
                </div>
                <div class="board-container">
                    <div class="board" id="board"></div>
                    <div class="col-numbers">
                        <div class="col-num">1</div>
                        <div class="col-num">2</div>
                        <div class="col-num">3</div>
                        <div class="col-num">4</div>
                        <div class="col-num">5</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 底部信息 -->
        <div class="bottom-info">
            <span class="cat-icon">🐱</span>
            <span class="remaining-text">剩余小猫: <span class="remaining-count" id="remainingCount">4</span></span>
        </div>
        
        <!-- 按钮区域 -->
        <div class="buttons">
            <button class="btn" id="colorblindBtn">色盲模式</button>
            <button class="btn" id="clearMarkersBtn">清除标记</button>
            <button class="btn" id="coordsBtn">坐标</button>
            <button class="btn" id="nextLevelBtn">第5关</button>
            <button class="btn" id="hintBtn">提示</button>
        </div>
    </div>
    
    <!-- Toast提示 -->
    <div class="toast" id="toast"></div>
    
    <!-- 胜利弹窗 -->
    <div class="modal" id="winModal">
        <div class="modal-content">
            <div class="modal-title">🎉 恭喜通关！</div>
            <div class="modal-subtitle">连胜 +1</div>
            <button class="modal-btn" id="nextBtn">下一关</button>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            GRID_SIZE: 5,
            TOTAL_CATS: 5
        };

        // ==================== 第4关数据 ====================
        // 区域划分: A, B, C, D, E, F, G, H, I, J
        // 每种区域只能放1只猫
        const LEVEL_4 = {
            regions: [
                ['A', 'A', 'B', 'B', 'C'],  // 第5行
                ['A', 'D', 'D', 'B', 'C'],  // 第4行
                ['E', 'D', 'F', 'F', 'C'],  // 第3行
                ['E', 'G', 'G', 'H', 'H'],  // 第2行
                ['I', 'I', 'I', 'J', 'J']   // 第1行
            ],
            // 初始已放置的猫 (row, col) 从1开始
            initialCats: [[2, 3]],
            // 正确解
            solution: [[2,3], [1,1], [3,4], [4,2], [5,5]]
        };

        // ==================== 音效系统（HTML版本）====================
        const AudioSystem = {
            sounds: {},
            init: function() {
                const soundNames = ['correct', 'error', 'victory', 'fail', 'click'];
                soundNames.forEach(name => {
                    this.sounds[name] = new Audio('audio/' + name + '.mp3');
                    this.sounds[name].volume = 0.8;
                    // 预加载音效
                    this.sounds[name].load();
                    console.log('Loaded audio: audio/' + name + '.mp3');
                });
            },
            play: function(name) {
                console.log('Attempting to play sound:', name);
                try {
                    if (this.sounds[name]) {
                        this.sounds[name].currentTime = 0;
                        this.sounds[name].play().then(() => {
                            console.log('Sound played successfully:', name);
                        }).catch(err => {
                            console.error('Sound play failed:', name, err);
                        });
                    } else {
                        console.warn('Sound not found:', name);
                    }
                } catch(e) {
                    console.error('Sound error:', e);
                }
            }
        };

        // ==================== 游戏状态 ====================
        let gameState = {
            currentLevel: 4,
            streak: 1,
            cats: [],           // [[row, col], ...]
            markers: [],        // [[row, col], ...]
            colorblindMode: false,
            showCoords: false,
            levelData: null
        };

        // ==================== DOM元素 ====================
        const boardEl = document.getElementById('board');
        const levelNumberEl = document.getElementById('levelNumber');
        const remainingCountEl = document.getElementById('remainingCount');
        const streakEl = document.getElementById('streak');
        const toastEl = document.getElementById('toast');
        const winModal = document.getElementById('winModal');
        const colorblindBtn = document.getElementById('colorblindBtn');
        const clearMarkersBtn = document.getElementById('clearMarkersBtn');
        const coordsBtn = document.getElementById('coordsBtn');
        const nextLevelBtn = document.getElementById('nextLevelBtn');
        const hintBtn = document.getElementById('hintBtn');

        // ==================== 初始化游戏 ====================
        function initGame() {
            AudioSystem.init();
            loadLevel(gameState.currentLevel);
            setupEventListeners();
        }

        function loadLevel(levelNum) {
            gameState.currentLevel = levelNum;
            gameState.cats = [];
            gameState.markers = [];
            gameState.levelData = JSON.parse(JSON.stringify(LEVEL_4));
            
            // 放置初始猫
            LEVEL_4.initialCats.forEach(([row, col]) => {
                gameState.cats.push([row, col]);
            });
            
            updateUI();
            renderBoard();
        }

        // ==================== 渲染棋盘 ====================
        function renderBoard() {
            boardEl.innerHTML = '';
            
            for (let row = 5; row >= 1; row--) {
                for (let col = 1; col <= 5; col++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = row;
                    cell.dataset.col = col;
                    
                    // 设置区域背景
                    const region = gameState.levelData.regions[5 - row][col - 1];
                    cell.dataset.region = region;
                    
                    // 检查是否有猫
                    const hasCat = gameState.cats.some(([r, c]) => r === row && c === col);
                    if (hasCat) {
                        cell.innerHTML = '<span class="cat">🐱</span>';
                    } else {
                        // 检查是否有标记
                        const hasMarker = gameState.markers.some(([r, c]) => r === row && c === col);
                        if (hasMarker) {
                            cell.innerHTML = '<div class="marker"></div>';
                        }
                        
                        // 显示坐标
                        if (gameState.showCoords) {
                            cell.innerHTML += `<span class="coords">${row},${col}</span>`;
                        }
                    }
                    
                    boardEl.appendChild(cell);
                }
            }
            
            // 更新区域背景（色盲模式）
            if (gameState.colorblindMode) {
                boardEl.classList.add('colorblind');
            } else {
                boardEl.classList.remove('colorblind');
            }
            
            updateRemainingCount();
        }

        // ==================== 更新UI ====================
        function updateUI() {
            levelNumberEl.textContent = `第${gameState.currentLevel}关`;
            remainingCountEl.textContent = CONFIG.TOTAL_CATS - gameState.cats.length;
            streakEl.textContent = gameState.streak;
            
            // 更新按钮状态
            colorblindBtn.classList.toggle('active', gameState.colorblindMode);
            coordsBtn.classList.toggle('active', gameState.showCoords);
            nextLevelBtn.textContent = `第${gameState.currentLevel + 1}关`;
        }

        function updateRemainingCount() {
            remainingCountEl.textContent = CONFIG.TOTAL_CATS - gameState.cats.length;
        }

        // ==================== 事件监听 ====================
        function setupEventListeners() {
            // 棋盘点击
            boardEl.addEventListener('click', handleCellClick);
            boardEl.addEventListener('contextmenu', handleRightClick);
            
            // 按钮
            colorblindBtn.addEventListener('click', toggleColorblindMode);
            clearMarkersBtn.addEventListener('click', clearAllMarkers);
            coordsBtn.addEventListener('click', toggleCoords);
            nextLevelBtn.addEventListener('click', goToNextLevel);
            hintBtn.addEventListener('click', showHint);
            
            // 胜利弹窗
            document.getElementById('nextBtn').addEventListener('click', () => {
                winModal.classList.remove('show');
                goToNextLevel();
            });
        }

        // ==================== 点击处理 ====================
        function handleCellClick(e) {
            const cell = e.target.closest('.cell');
            if (!cell) return;
            
            AudioSystem.play('click');
            
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            
            // 检查是否已有猫
            const catIndex = gameState.cats.findIndex(([r, c]) => r === row && c === col);
            
            if (catIndex !== -1) {
                // 移除猫
                gameState.cats.splice(catIndex, 1);
                renderBoard();
                return;
            }
            
            // 检查是否已有标记
            const markerIndex = gameState.markers.findIndex(([r, c]) => r === row && c === col);
            if (markerIndex !== -1) {
                // 移除标记
                gameState.markers.splice(markerIndex, 1);
                renderBoard();
                return;
            }
            
            // 尝试放置猫
            if (canPlaceCat(row, col)) {
                gameState.cats.push([row, col]);
                AudioSystem.play('correct');
                renderBoard();
                checkWin();
            } else {
                AudioSystem.play('error');
                // 找猫失败：先变红，0.5秒后显示X标记
                cell.style.background = '#ffcccc';
                setTimeout(() => {
                    cell.style.background = '';
                    // 在该位置添加X标记
                    gameState.markers.push([row, col]);
                    // 标记为X（用特殊标记区分普通标记）
                    cell.innerHTML = '<div class="x-mark">✕</div>';
                    cell.style.background = '#ffcccc';
                    cell.style.opacity = '0.7';
                }, 500);
            }
        }

        function handleRightClick(e) {
            e.preventDefault();
            
            const cell = e.target.closest('.cell');
            if (!cell) return;
            
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            
            // 不能在有猫的位置标记
            const hasCat = gameState.cats.some(([r, c]) => r === row && c === col);
            if (hasCat) return;
            
            // 切换标记
            const markerIndex = gameState.markers.findIndex(([r, c]) => r === row && c === col);
            if (markerIndex !== -1) {
                gameState.markers.splice(markerIndex, 1);
            } else {
                gameState.markers.push([row, col]);
            }
            
            renderBoard();
        }

        // ==================== 规则校验 ====================
        function canPlaceCat(row, col) {
            // 1. 检查行 - 每行只能有1只猫
            const rowCats = gameState.cats.filter(([r]) => r === row);
            if (rowCats.length >= 1) {
                return false;
            }
            
            // 2. 检查列 - 每列只能有1只猫
            const colCats = gameState.cats.filter(([, c]) => c === col);
            if (colCats.length >= 1) {
                return false;
            }
            
            // 3. 检查区域 - 每种颜色区域只能有1只猫
            const region = gameState.levelData.regions[5 - row][col - 1];
            const regionCats = gameState.cats.filter(([r, c]) => {
                return gameState.levelData.regions[5 - r][c - 1] === region;
            });
            if (regionCats.length >= 1) {
                return false;
            }
            
            // 4. 检查上下左右相邻 - 不能有猫
            const directions = [[-1, 0], [1, 0], [0, -1], [0, 1]];
            for (const [dr, dc] of directions) {
                const nr = row + dr;
                const nc = col + dc;
                if (nr >= 1 && nr <= 5 && nc >= 1 && nc <= 5) {
                    const hasAdjacentCat = gameState.cats.some(([r, c]) => r === nr && c === nc);
                    if (hasAdjacentCat) {
                        return false;
                    }
                }
            }
            
            return true;
        }

        function getValidPositions() {
            const validPositions = [];
            for (let row = 1; row <= 5; row++) {
                for (let col = 1; col <= 5; col++) {
                    const hasCat = gameState.cats.some(([r, c]) => r === row && c === col);
                    if (!hasCat && canPlaceCat(row, col)) {
                        validPositions.push([row, col]);
                    }
                }
            }
            return validPositions;
        }

        // ==================== 胜利检测 ====================
        function checkWin() {
            if (gameState.cats.length === CONFIG.TOTAL_CATS) {
                // 检查是否所有猫都满足规则
                let isValid = true;
                for (const [row, col] of gameState.cats) {
                    if (!canPlaceCat(row, col)) {
                        isValid = false;
                        break;
                    }
                }
                
                if (isValid) {
                    gameState.streak++;
                    showWinModal();
                }
            }
        }

        function showWinModal() {
            AudioSystem.play('victory');
            winModal.classList.add('show');
        }

        // ==================== 按钮功能 ====================
        function toggleColorblindMode() {
            gameState.colorblindMode = !gameState.colorblindMode;
            updateUI();
            renderBoard();
        }

        function clearAllMarkers() {
            gameState.markers = [];
            renderBoard();
            showToast('已清除所有标记');
        }

        function toggleCoords() {
            gameState.showCoords = !gameState.showCoords;
            updateUI();
            renderBoard();
        }

        function goToNextLevel() {
            gameState.currentLevel++;
            loadLevel(gameState.currentLevel);
        }

        function showHint() {
            const validPositions = getValidPositions();
            if (validPositions.length === 0) {
                showToast('无可用位置');
                return;
            }
            
            // 随机选择一个有效位置高亮
            const [row, col] = validPositions[Math.floor(Math.random() * validPositions.length)];
            const cell = boardEl.querySelector(`[data-row="${row}"][data-col="${col}"]`);
            if (cell) {
                cell.classList.add('hint');
                setTimeout(() => cell.classList.remove('hint'), 2000);
            }
        }

        // ==================== Toast提示 ====================
        function showToast(message) {
            toastEl.textContent = message;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 1500);
        }

        // ==================== 启动游戏 ====================
        initGame();
    </script>
</body>
</html>
